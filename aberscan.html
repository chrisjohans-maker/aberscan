<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#110E0C">
<title>AberScan</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--sans:'DM Sans',sans-serif;--mono:'Space Mono',monospace;--accent:#8B2942;--al:#A83355;--bg:#110E0C;--text:#F5F0EB;--muted:#8B7B72;--dim:#6B5E55}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
@keyframes scanLine{0%{top:0}100%{top:calc(100% - 2px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState, useRef, useCallback, useEffect} = React;

function getApiKey(){ return localStorage.getItem('aberscan_api_key'); }
function setApiKey(k){ localStorage.setItem('aberscan_api_key', k); }
function clearApiKey(){ localStorage.removeItem('aberscan_api_key'); }

const CAT_STYLE = {
  beer:{icon:"🍺",c:"#E8A838"},cider:{icon:"🍏",c:"#8BC34A"},seltzer:{icon:"✨",c:"#00BCD4"},
  rtd:{icon:"🍹",c:"#FF7043"},wine:{icon:"🍷",c:"#C0392B"},spirit:{icon:"🥃",c:"#E67E22"},
  garnish:{icon:"🍋",c:"#2ECC71"},mixer:{icon:"🧃",c:"#3498DB"},"non-alcoholic":{icon:"🥤",c:"#1ABC9C"},
  food:{icon:"🍽️",c:"#E74C3C"},suppli:{icon:"📦",c:"#95A5A6"},other:{icon:"📋",c:"#7F8C8D"},
};
const catStyle=(cat)=>{const k=Object.keys(CAT_STYLE).find(k=>cat.toLowerCase().includes(k));return CAT_STYLE[k]||CAT_STYLE.other;};

/* ── Extract JSON robustly ── */
function extractJSON(text) {
  const s = text.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
  try { return JSON.parse(s); } catch {}
  let start=-1,depth=0,end=-1;
  for(let i=0;i<text.length;i++){
    if(text[i]==='{'){if(depth===0)start=i;depth++;}
    else if(text[i]==='}'){depth--;if(depth===0&&start>=0){end=i;break;}}
  }
  if(start>=0&&end>start){try{return JSON.parse(text.substring(start,end+1));}catch{}}
  return null;
}

/* ── Two-step scan: describe then structure ── */
async function scanImage(b64, apiKey) {
  // Step 1: Describe everything
  const r1 = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514", max_tokens:1500,
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
        {type:"text",text:"List every single item visible in this photo. Go left to right across the image. Number each item. For each, describe: color, shape, any text/logos you can read, and what product you think it is. Be thorough — don't skip any item even if blurry or partially hidden."},
      ]}],
    }),
  });
  if(!r1.ok){const e=await r1.json().catch(()=>({}));throw new Error(e.error?.message||`API ${r1.status}`);}
  const d1=await r1.json();
  const description=(d1.content||[]).map(c=>c.text||"").join("");
  if(!description.trim()) throw new Error("Empty description from Step 1");

  // Step 2: Convert to JSON
  const r2 = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514", max_tokens:2000,
      messages:[
        {role:"user",content:[
          {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
          {type:"text",text:"List every item in this photo, numbered, left to right."},
        ]},
        {role:"assistant",content:description},
        {role:"user",content:"Good. Now convert that EXACT list into this JSON format. Every item you listed must appear. The total must equal the number of items you described.\n\nCategories: Beer, Ciders, Seltzers, RTD/Cocktails, Wine, Spirits, Garnishes, Mixers, Non-Alcoholic, Food, Supplies, Other\n\nOutput ONLY JSON, nothing else:\n{\"categories\":[{\"category\":\"Beer\",\"items\":[{\"product\":\"Coors Light\",\"type\":\"can\",\"count\":4,\"details\":\"12oz\"}]}],\"total\":7,\"overall_confidence\":85,\"notes\":\"\"}"},
      ],
    }),
  });
  if(!r2.ok){const e=await r2.json().catch(()=>({}));throw new Error(e.error?.message||`API ${r2.status}`);}
  const d2=await r2.json();
  const txt=(d2.content||[]).map(c=>c.text||"").join("");
  const parsed=extractJSON(txt);
  if(!parsed||!Array.isArray(parsed.categories)) throw new Error("Could not parse results");

  // Normalize
  const cats=parsed.categories.map(g=>{
    const items=(g.items||[]).map(i=>({product:i.product||"Unknown",type:i.type||"item",count:typeof i.count==="number"?i.count:parseInt(i.count)||0,details:i.details||""}));
    return {category:g.category||"Other",items,subtotal:items.reduce((s,i)=>s+i.count,0)};
  }).filter(g=>g.items.length>0);

  return {
    categories:cats,
    total:cats.reduce((s,g)=>s+g.subtotal,0),
    confidence:typeof parsed.overall_confidence==="number"?parsed.overall_confidence:null,
    notes:parsed.notes||"",
    description, // keep the raw description for debugging
  };
}

/* ── APP ── */
function App() {
  const videoRef=useRef(null), canvasRef=useRef(null), streamRef=useRef(null), scanningRef=useRef(false);
  const [apiKey,setApiKeyState]=useState(getApiKey()||"");
  const [keyInput,setKeyInput]=useState("");
  const [streaming,setStreaming]=useState(false);
  const [scanning,setScanning]=useState(false);
  const [scanStage,setScanStage]=useState("");
  const [results,setResults]=useState(null);
  const [error,setError]=useState(null);
  const [facingMode,setFacingMode]=useState("environment");
  const [tab,setTab]=useState("camera");
  const [collapsed,setCollapsed]=useState({});
  const [debugImg,setDebugImg]=useState(null);
  const [showDesc,setShowDesc]=useState(false);

  const startCamera=useCallback(async(facing)=>{
    try{
      setError(null);
      if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing||facingMode,width:{ideal:1920},height:{ideal:1080}},audio:false});
      streamRef.current=stream;
      if(videoRef.current){videoRef.current.srcObject=stream;await videoRef.current.play();}
      setStreaming(true);
    }catch{setError("Camera access denied.");}
  },[facingMode]);

  const stopCamera=useCallback(()=>{
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
    if(videoRef.current)videoRef.current.srcObject=null;
    setStreaming(false);
  },[]);

  const flipCamera=useCallback(()=>{
    const n=facingMode==="environment"?"user":"environment";
    setFacingMode(n);if(streaming)startCamera(n);
  },[facingMode,streaming,startCamera]);

  const doScan=useCallback(async()=>{
    if(!videoRef.current||!canvasRef.current||scanningRef.current)return;
    scanningRef.current=true; setScanning(true); setError(null); setScanStage("capturing");

    const v=videoRef.current, c=canvasRef.current;
    if(v.videoWidth===0){setError("Camera not ready.");setScanning(false);setScanStage("");scanningRef.current=false;return;}

    c.width=v.videoWidth; c.height=v.videoHeight;
    c.getContext("2d").drawImage(v,0,0);
    const dataUrl=c.toDataURL("image/jpeg",0.85);
    const b64=dataUrl.split(",")[1];
    setDebugImg(dataUrl);

    // Black frame check
    const px=c.getContext("2d").getImageData(0,0,Math.min(c.width,10),Math.min(c.height,10));
    if(px.data.every((v,i)=>i%4===3?true:v===0)){setError("Black frame — try again.");setScanning(false);setScanStage("");scanningRef.current=false;return;}

    setScanStage("describing");
    try{
      const result=await scanImage(b64,getApiKey());
      setResults(result);
      setTab("results");
    }catch(e){
      console.error(e);
      if(e.message.includes("401")||e.message.includes("403"))setError("Invalid API key. Tap ⚙️ to fix.");
      else if(e.message.includes("429"))setError("Rate limited — wait and retry.");
      else setError(e.message||"Scan failed.");
    }finally{
      setScanning(false);setScanStage("");scanningRef.current=false;
    }
  },[]);

  useEffect(()=>()=>stopCamera(),[stopCamera]);

  const clearScan=()=>{setResults(null);setTab("camera");setShowDesc(false);};

  // ── API KEY SCREEN ──
  if(!apiKey){
    return(
      <div style={S.root}>
        <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"0 24px"}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontFamily:"Georgia,serif",fontWeight:700,fontStyle:"italic",color:"#FFF",border:"2px solid rgba(255,255,255,0.15)",marginBottom:14}}>A</div>
          <div style={{display:"flex",alignItems:"baseline",gap:0,marginBottom:24}}>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:800,color:"#F5F0EB"}}>Aber</span>
            <span style={{fontFamily:"var(--mono)",fontSize:21,fontWeight:700,color:"var(--al)"}}>Scan</span>
          </div>
          <div style={{fontFamily:"var(--sans)",fontSize:13,color:"var(--muted)",marginBottom:16,textAlign:"center"}}>Enter API key to get started</div>
          <input type="password" value={keyInput} onChange={e=>setKeyInput(e.target.value)} placeholder="sk-ant-..." style={{width:"100%",maxWidth:320,padding:"14px 16px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,color:"var(--text)",fontFamily:"var(--mono)",fontSize:13,outline:"none",marginBottom:12}} onKeyDown={e=>{if(e.key==="Enter"&&keyInput.trim()){setApiKey(keyInput.trim());setApiKeyState(keyInput.trim());}}}/>
          <button onClick={()=>{if(keyInput.trim()){setApiKey(keyInput.trim());setApiKeyState(keyInput.trim());}}} style={{width:"100%",maxWidth:320,padding:"14px",background:"linear-gradient(135deg,var(--accent),var(--al))",border:"none",borderRadius:12,color:"#FFF",fontFamily:"var(--sans)",fontSize:15,fontWeight:700,cursor:"pointer",minHeight:48}}>Connect</button>
          <div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--dim)",marginTop:12,textAlign:"center"}}>Key is stored locally on this device only</div>
        </div>
      </div>
    );
  }

  // ── MAIN APP ──
  return(
    <div style={S.root}>
      {/* HEADER */}
      <div style={S.header}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:"#110E0C",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontFamily:"Georgia,serif",fontWeight:700,fontStyle:"italic",color:"#FFF",border:"3px solid var(--accent)",boxShadow:"0 0 0 1px #6B1D32"}}>A</div>
          <div style={{display:"flex",alignItems:"baseline"}}>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:800,color:"#F5F0EB",letterSpacing:0.2}}>Aber</span>
            <span style={{fontFamily:"var(--mono)",fontSize:14,fontWeight:700,color:"var(--al)",letterSpacing:-0.5}}>Scan</span>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontFamily:"var(--mono)",fontSize:9,color:"#6B5E55"}}>v3.1.0</span>
          <button onClick={()=>{clearApiKey();setApiKeyState("");}} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:"#8B7B72",fontSize:14,cursor:"pointer",padding:"5px 8px",minHeight:32,display:"flex",alignItems:"center"}}>⚙️</button>
        </div>
      </div>

      {/* TABS */}
      <div style={S.tabBar}>
        <button style={{...S.tabBtn,...(tab==="camera"?S.tabAct:{})}} onClick={()=>setTab("camera")}>📷 Camera</button>
        <button style={{...S.tabBtn,...(tab==="results"?S.tabAct:{})}} onClick={()=>setTab("results")}>
          📊 Results {results&&<span style={S.badge}>{results.total}</span>}
        </button>
      </div>

      {/* ═══ CAMERA TAB ═══ */}
      {tab==="camera"&&(
        <div style={S.page}>
          <div style={S.viewfinder}>
            <video ref={videoRef} style={S.video} playsInline muted/>
            <canvas ref={canvasRef} style={{display:"none"}}/>
            {scanning&&(<div style={S.scanOverlay}><div style={S.scanLine}/><div style={{position:"absolute",bottom:16,left:0,right:0,textAlign:"center"}}><span style={{fontFamily:"var(--mono)",fontSize:11,color:"#FFF",background:"rgba(0,0,0,0.7)",padding:"6px 14px",borderRadius:8}}>{scanStage==="capturing"?"📸 Capturing...":"🔍 Analyzing..."}</span></div></div>)}
            {!streaming&&(<div style={S.placeholder}><span style={{fontSize:44,marginBottom:10}}>📷</span><span style={{fontFamily:"var(--sans)",fontSize:15,color:"#8899AA",fontWeight:600}}>Tap to start camera</span><span style={{fontFamily:"var(--mono)",fontSize:10,color:"#556677",marginTop:3}}>Point at shelves, fridges, or bar</span></div>)}
            {streaming&&!scanning&&[["top","left"],["top","right"],["bottom","left"],["bottom","right"]].map(([v,h])=>(<div key={v+h} style={{position:"absolute",[v]:10,[h]:10,width:24,height:24,borderRadius:2,[`border${v[0].toUpperCase()+v.slice(1)}`]:"3px solid var(--al)",[`border${h[0].toUpperCase()+h.slice(1)}`]:"3px solid var(--al)"}}/>))}
          </div>

          <div style={S.ctrlRow}>
            {!streaming?(
              <button style={S.bigBtn} onClick={()=>startCamera()}>Start Camera</button>
            ):(
              <>
                <button style={S.circBtn} onClick={flipCamera}>🔄</button>
                <button style={{...S.bigBtn,flex:1,opacity:scanning?.5:1}} onClick={doScan} disabled={scanning}>{scanning?(scanStage==="capturing"?"📸 Capturing...":"🔍 Analyzing..."):"⊙ Scan"}</button>
                <button style={S.circBtn} onClick={stopCamera}>✕</button>
              </>
            )}
          </div>
          {error&&<div style={S.err}>⚠️ {error}</div>}

          {debugImg&&(
            <div style={{marginTop:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{fontFamily:"var(--mono)",fontSize:9,color:"#8B7B72",textTransform:"uppercase",letterSpacing:1}}>Last captured frame</span>
                <button onClick={()=>setDebugImg(null)} style={{background:"none",border:"none",color:"#8B7B72",fontSize:10,fontFamily:"var(--mono)",cursor:"pointer"}}>✕ hide</button>
              </div>
              <img src={debugImg} style={{width:"100%",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)"}}/>
            </div>
          )}
        </div>
      )}

      {/* ═══ RESULTS TAB ═══ */}
      {tab==="results"&&(
        <div style={S.page}>
          {!results?(
            <div style={S.empty}><span style={{fontSize:40}}>📷</span><span style={{color:"#667788",fontSize:14}}>No scan yet</span></div>
          ):(
            <>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontFamily:"var(--mono)",fontSize:9,color:"#667788"}}>Current scan</span>
                <button onClick={clearScan} style={{fontFamily:"var(--mono)",fontSize:10,color:"#E74C3C",background:"rgba(231,76,60,0.08)",border:"1px solid rgba(231,76,60,0.2)",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontWeight:700,minHeight:32}}>✕ Clear</button>
              </div>

              {/* Total */}
              <div style={S.summaryCard}>
                <div style={S.label}>Scan Results</div>
                <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                  <span style={{fontFamily:"var(--mono)",fontSize:30,fontWeight:700,color:"var(--al)"}}>{results.total}</span>
                  <span style={{fontFamily:"var(--mono)",fontSize:11,color:"#667788"}}>items</span>
                </div>
              </div>

              {/* Confidence */}
              {results.confidence!=null&&(()=>{
                const c=results.confidence;
                const lvl=c>=90?"high":c>=70?"medium":"low";
                const cfg={high:{e:"🟢",c:"#2ECC71",bg:"rgba(46,204,113,0.08)",bd:"rgba(46,204,113,0.2)"},medium:{e:"🟡",c:"#F1C40F",bg:"rgba(241,196,15,0.08)",bd:"rgba(241,196,15,0.2)"},low:{e:"🔴",c:"#E74C3C",bg:"rgba(231,76,60,0.08)",bd:"rgba(231,76,60,0.2)"}}[lvl];
                return(<div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:cfg.bg,border:`1px solid ${cfg.bd}`,borderRadius:10,marginBottom:10}}><span style={{fontSize:16}}>{cfg.e}</span><span style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:700,color:cfg.c}}>{c}%</span></div>);
              })()}

              {/* Category chips */}
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
                {(results.categories||[]).map(g=>{const s=catStyle(g.category);return<span key={g.category} style={{fontFamily:"var(--mono)",fontSize:10,padding:"3px 8px",borderRadius:6,background:s.c+"18",color:s.c,fontWeight:600}}>{s.icon} {g.subtotal} {g.category}</span>;})}
              </div>

              {/* Category list */}
              {(results.categories||[]).map((g,gi)=>{
                const st=catStyle(g.category);
                const isColl=collapsed[g.category];
                return(
                  <div key={g.category} style={{background:"rgba(255,255,255,0.02)",borderRadius:12,overflow:"hidden",border:"1px solid rgba(255,255,255,0.04)",marginBottom:8,animation:"slideUp .3s ease both",animationDelay:`${gi*50}ms`}}>
                    <button style={S.catHead} onClick={()=>setCollapsed(p=>({...p,[g.category]:!p[g.category]}))}>
                      <div style={{display:"flex",alignItems:"center",gap:7}}>
                        <span style={{fontSize:18}}>{st.icon}</span>
                        <span style={{fontFamily:"var(--sans)",fontSize:14,fontWeight:700,color:"#E8EEF4"}}>{g.category}</span>
                        <span style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:700,padding:"1px 7px",borderRadius:5,background:st.c+"18",color:st.c}}>{g.subtotal}</span>
                      </div>
                      <span style={{color:"#556677",fontSize:13,transform:isColl?"rotate(-90deg)":"rotate(0)",transition:"transform .15s"}}>▾</span>
                    </button>
                    {!isColl&&(
                      <div style={{padding:"0 8px 8px"}}>
                        {(g.items||[]).map((item,ii)=>(
                          <div key={ii} style={{display:"flex",alignItems:"flex-start",padding:"10px 8px",marginBottom:4,gap:8,borderLeft:`3px solid ${st.c}33`,borderRadius:10,background:"rgba(255,255,255,0.02)"}}>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                                <span style={{fontFamily:"var(--sans)",fontSize:13,fontWeight:600,color:"#EDE5DD"}}>{item.product}</span>
                                <span style={{fontFamily:"var(--mono)",fontSize:9,padding:"1px 6px",borderRadius:4,border:"1px solid "+st.c+"40",background:st.c+"20",color:st.c,textTransform:"uppercase",letterSpacing:.7,fontWeight:700}}>{item.type}</span>
                              </div>
                              {item.details&&<div style={{fontFamily:"var(--sans)",fontSize:11,color:"#8B7B72",lineHeight:1.2,marginTop:3}}>{item.details}</div>}
                            </div>
                            <span style={{fontFamily:"var(--mono)",fontSize:22,fontWeight:700,color:st.c,flexShrink:0}}>{item.count}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}

              {results.notes&&results.notes!=="No inventory items detected"&&(
                <div style={{marginTop:12,padding:10,background:"rgba(255,255,255,0.02)",borderRadius:8,border:"1px solid rgba(255,255,255,0.04)",display:"flex",flexDirection:"column"}}>
                  <span style={{fontFamily:"var(--mono)",fontSize:9,color:"#667788",textTransform:"uppercase",letterSpacing:1.5,marginBottom:3}}>Notes</span>
                  <span style={{fontFamily:"var(--sans)",fontSize:12,color:"#AABBCC",lineHeight:1.4}}>{results.notes}</span>
                </div>
              )}

              {/* Debug: show AI description */}
              {results.description&&(
                <div style={{marginTop:12}}>
                  <button onClick={()=>setShowDesc(!showDesc)} style={{fontFamily:"var(--mono)",fontSize:9,color:"#6B5E55",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:6,padding:"4px 10px",cursor:"pointer"}}>{showDesc?"▾ Hide":"▸ Show"} AI description</button>
                  {showDesc&&<div style={{marginTop:6,padding:10,background:"rgba(255,255,255,0.02)",borderRadius:8,border:"1px solid rgba(255,255,255,0.04)",fontFamily:"var(--mono)",fontSize:10,color:"#8B7B72",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{results.description}</div>}
                </div>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
}

const S={
  root:{minHeight:"100dvh",background:"#110E0C",fontFamily:"var(--sans)",color:"#F5F0EB",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"},
  header:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"max(14px, env(safe-area-inset-top, 14px)) 16px 6px",position:"sticky",top:0,zIndex:20,background:"#110E0C"},
  tabBar:{display:"flex",padding:"0 12px 6px",gap:4,position:"sticky",top:52,zIndex:20,background:"#110E0C"},
