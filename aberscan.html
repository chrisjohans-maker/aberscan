<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#110E0C">
<title>AberScan</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--sans:'DM Sans',sans-serif;--mono:'Space Mono',monospace;--accent:#8B2942;--al:#A83355;--bg:#110E0C;--text:#F5F0EB;--muted:#8B7B72;--dim:#6B5E55}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
@keyframes scanLine{0%{top:0}100%{top:calc(100% - 2px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useRef,useCallback,useEffect}=React;

const APP_VERSION='5.9.0';
(()=>{
  const s=localStorage.getItem('aberscan_version');
  if(s&&s!==APP_VERSION){localStorage.setItem('aberscan_version',APP_VERSION);if(typeof caches!=='undefined')caches.keys().then(k=>Promise.all(k.map(c=>caches.delete(c))));window.location.reload(true);return;}
  localStorage.setItem('aberscan_version',APP_VERSION);
})();

function getApiKey(){return localStorage.getItem('aberscan_api_key');}
function setApiKey(k){localStorage.setItem('aberscan_api_key',k);}
function clearApiKey(){localStorage.removeItem('aberscan_api_key');}

const VOLUME_TIERS={high:{label:"High volume",par:24,color:"#E24B4A",bg:"#FCEBEB"},med:{label:"Med volume",par:12,color:"#BA7517",bg:"#FAEEDA"},low:{label:"Low volume",par:6,color:"#0F6E56",bg:"#E1F5EE"}};

const STOCK_LEVELS={
  low:{label:"Restock now",color:"#E24B4A",bg:"rgba(226,75,74,0.08)",border:"#E24B4A"},
  getting_low:{label:"Getting low",color:"#BA7517",bg:"rgba(186,117,23,0.08)",border:"#EF9F27"},
  good:{label:"Good",color:"#639922",bg:"rgba(99,153,34,0.08)",border:"#97C459"},
};

function getStockLevel(count, par) {
  if (!par) return "good";
  const pct = count / par;
  if (pct <= 0.25) return "low";
  if (pct <= 0.5) return "getting_low";
  return "good";
}

function findPar(productName, parList) {
  if (!productName) return null;
  const name = productName.toLowerCase();
  return parList.find(p => name.includes(p.name.toLowerCase()) || p.name.toLowerCase().includes(name)) || null;
}

function getParList(){try{return JSON.parse(localStorage.getItem('aberscan_pars'))||[];}catch{return[];}}
function saveParList(list){localStorage.setItem('aberscan_pars',JSON.stringify(list));}

const CAT={beer:{icon:"🍺",c:"#E8A838"},cider:{icon:"🍏",c:"#8BC34A"},seltzer:{icon:"✨",c:"#00BCD4"},rtd:{icon:"🍹",c:"#FF7043"},wine:{icon:"🍷",c:"#C0392B"},spirit:{icon:"🥃",c:"#E67E22"},garnish:{icon:"🍋",c:"#2ECC71"},mixer:{icon:"🧃",c:"#3498DB"},"non-alcoholic":{icon:"🥤",c:"#1ABC9C"},food:{icon:"🍽️",c:"#E74C3C"},suppli:{icon:"📦",c:"#95A5A6"},other:{icon:"📋",c:"#7F8C8D"}};
const catStyle=cat=>{const k=Object.keys(CAT).find(k=>cat.toLowerCase().includes(k));return CAT[k]||CAT.other;};

function App(){
  const scanRef=useRef(false);
  const fileRef=useRef(null);
  const[apiKey,setAK]=useState(getApiKey()||"");
  const[keyIn,setKeyIn]=useState("");
  const[scanning,setScanning]=useState(false);
  const[results,setResults]=useState(null);
  const[error,setError]=useState(null);
  const[tab,setTab]=useState("camera");
  const[collapsed,setCollapsed]=useState({});
  const[parList,setParList]=useState(getParList());
  const[addingProduct,setAddingProduct]=useState(false);
  const[newName,setNewName]=useState("");
  const[newVolume,setNewVolume]=useState("med");
  const[newPar,setNewPar]=useState("");
  const[editingPar,setEditingPar]=useState(null);

  const addPar=()=>{
    if(!newName.trim())return;
    const tier=VOLUME_TIERS[newVolume];
    const par=parseInt(newPar)||tier.par;
    const next=[...parList,{name:newName.trim(),volume:newVolume,par}];
    setParList(next);saveParList(next);
    setNewName("");setNewVolume("med");setNewPar("");setAddingProduct(false);
  };
  const removePar=(i)=>{const next=parList.filter((_,idx)=>idx!==i);setParList(next);saveParList(next);};
  const updatePar=(i,updates)=>{
    const next=parList.map((p,idx)=>idx===i?{...p,...updates}:p);
    setParList(next);saveParList(next);setEditingPar(null);
  };

  // Shared: send b64 image to API and process results
  const processImage=useCallback(async(b64,mediaType)=>{
    setScanning(true);setError(null);setResults(null);
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":getApiKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:4000,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:mediaType,data:b64}},
            {type:"text",text:`Count every item in this image. Bar inventory scan.

For each product: name and count. Group by category.

Categories: Beer, Ciders, Seltzers, RTD/Cocktails, Wine, Spirits, Non-Alcoholic, Other

COUNTING METHOD:
- Count by TOPS: can tops, bottle caps, wine cork/cap tops, bottle necks. Every visible top = 1 item.
- If you see 24 can tops in a group but only 3 readable labels, count all 24 and identify the product from the readable labels.
- Items in rows going back: count every top you can see from above, not just front-facing labels.
- Identify products by any visible label, color, cap color, or can/bottle shape. If a group of identical-looking items has one readable label, apply that name to the whole group.

Rules:
- Count ALL visible items. Every cap, top, or lid = 1 unit.
- Each distinct product = own line.
- If unreadable, describe by color/shape.

JSON only, no markdown:
{"categories":[{"category":"Beer","items":[{"product":"Coors Light","count":24},{"product":"Modelo Especial","count":20}]},{"category":"Wine","items":[{"product":"Woodbridge Chardonnay","count":4}]}],"total":48}`},
          ]}],
        }),
      });
      if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(r.status===401?"Invalid API key.":r.status===429?"Rate limited.":e.error?.message||`Error ${r.status}`);}
      const d=await r.json();
      const txt=(d.content||[]).map(c=>c.text||"").join("");
      if(!txt.trim())throw new Error("Empty response.");
      let p=null;
      try{p=JSON.parse(txt.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim());}catch{}
      if(!p){let s=-1,dep=0,e=-1;for(let i=0;i<txt.length;i++){if(txt[i]==='{'){if(dep===0)s=i;dep++;}else if(txt[i]==='}'){dep--;if(dep===0&&s>=0){e=i;break;}}}if(s>=0&&e>s)try{p=JSON.parse(txt.substring(s,e+1));}catch{}}
      if(!p||!Array.isArray(p.categories))throw new Error("Couldn't parse results.");
      const cats=p.categories.map(g=>{const items=(g.items||[]).map(i=>({product:i.product||"Unknown",type:i.type||"",count:typeof i.count==="number"?i.count:parseInt(i.count)||0,details:i.details||""}));return{category:g.category||"Other",items,subtotal:items.reduce((s,i)=>s+i.count,0)};}).filter(g=>g.items.length>0);
      setResults({categories:cats,total:cats.reduce((s,g)=>s+g.subtotal,0),notes:p.notes||""});
      setTab("results");
    }catch(e){console.error(e);setError(e.message||"Scan failed.");}
    finally{setScanning(false);scanRef.current=false;}
  },[]);

  // Full-resolution photo scan
  const doPhotoScan=useCallback((e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    scanRef.current=true;
    const reader=new FileReader();
    reader.onload=()=>{
      const dataUrl=reader.result;
      const mediaType=file.type||"image/jpeg";
      const b64=dataUrl.split(",")[1];
      processImage(b64,mediaType);
    };
    reader.onerror=()=>{setError("Failed to read photo.");scanRef.current=false;};
    reader.readAsDataURL(file);
    e.target.value="";
  },[processImage]);

  // ── Result editing helpers (does NOT touch scan logic) ──
  const[editing,setEditing]=useState(null); // "gi-ii-field"
  const[editVal,setEditVal]=useState("");

  const startEdit=(gi,ii,field)=>{
    const item=results.categories[gi].items[ii];
    setEditing(`${gi}-${ii}-${field}`);
    setEditVal(field==="count"?String(item.count):item.product);
  };

  const commitEdit=()=>{
    if(!editing||!results)return;
    const[gi,ii,field]=editing.split("-");
    const g=parseInt(gi),i=parseInt(ii);
    const cats=results.categories.map((cat,ci)=>{
      if(ci!==g)return cat;
      const items=cat.items.map((item,idx)=>{
        if(idx!==i)return item;
        if(field==="count")return{...item,count:Math.max(0,parseInt(editVal)||0)};
        return{...item,product:editVal.trim()||item.product};
      });
      return{...cat,items,subtotal:items.reduce((s,it)=>s+it.count,0)};
    });
    setResults({...results,categories:cats,total:cats.reduce((s,c)=>s+c.subtotal,0)});
    setEditing(null);setEditVal("");
  };

  const deleteItem=(gi,ii)=>{
    if(!results)return;
    const cats=results.categories.map((cat,ci)=>{
      if(ci!==gi)return cat;
      const items=cat.items.filter((_,idx)=>idx!==ii);
      return{...cat,items,subtotal:items.reduce((s,it)=>s+it.count,0)};
    }).filter(cat=>cat.items.length>0);
    setResults({...results,categories:cats,total:cats.reduce((s,c)=>s+c.subtotal,0)});
  };

  const addItem=(gi)=>{
    if(!results)return;
    const cats=results.categories.map((cat,ci)=>{
      if(ci!==gi)return cat;
      const items=[...cat.items,{product:"New Item",type:"item",count:1,details:""}];
      return{...cat,items,subtotal:items.reduce((s,it)=>s+it.count,0)};
    });
    setResults({...results,categories:cats,total:cats.reduce((s,c)=>s+c.subtotal,0)});
    // Auto-edit the new item's name
    const newIdx=cats[gi].items.length-1;
    setEditing(`${gi}-${newIdx}-product`);setEditVal("New Item");
  };

  // API Key screen
  if(!apiKey)return(
    <div style={S.root}><div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"0 24px"}}>
      <div style={{width:36,height:36,borderRadius:"50%",background:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontFamily:"Georgia,serif",fontWeight:700,fontStyle:"italic",color:"#FFF",border:"2px solid rgba(255,255,255,0.15)",marginBottom:14}}>A</div>
      <div style={{display:"flex",alignItems:"baseline",marginBottom:24}}><span style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:800,color:"#F5F0EB"}}>Aber</span><span style={{fontFamily:"var(--mono)",fontSize:21,fontWeight:700,color:"var(--al)"}}>Scan</span></div>
      <div style={{fontSize:13,color:"var(--muted)",marginBottom:16,textAlign:"center"}}>Enter API key to get started</div>
      <input type="password" value={keyIn} onChange={e=>setKeyIn(e.target.value)} placeholder="sk-ant-..." style={{width:"100%",maxWidth:320,padding:"14px 16px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,color:"var(--text)",fontFamily:"var(--mono)",fontSize:13,outline:"none",marginBottom:12}} onKeyDown={e=>{if(e.key==="Enter"&&keyIn.trim()){setApiKey(keyIn.trim());setAK(keyIn.trim());}}}/>
      <button onClick={()=>{if(keyIn.trim()){setApiKey(keyIn.trim());setAK(keyIn.trim());}}} style={{width:"100%",maxWidth:320,padding:"14px",background:"linear-gradient(135deg,var(--accent),var(--al))",border:"none",borderRadius:12,color:"#FFF",fontSize:15,fontWeight:700,cursor:"pointer",minHeight:48}}>Connect</button>
      <div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--dim)",marginTop:12}}>Key stored locally only</div>
    </div></div>
  );

  return(
    <div style={S.root}>
      <div style={S.hdr}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:"#110E0C",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontFamily:"Georgia,serif",fontWeight:700,fontStyle:"italic",color:"#FFF",border:"3px solid var(--accent)"}}>A</div>
          <div style={{display:"flex",alignItems:"baseline"}}><span style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:800,color:"#F5F0EB"}}>Aber</span><span style={{fontFamily:"var(--mono)",fontSize:14,fontWeight:700,color:"var(--al)"}}>Scan</span></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <button onClick={()=>{if(typeof caches!=='undefined')caches.keys().then(k=>Promise.all(k.map(c=>caches.delete(c))));window.location.reload(true);}} style={{display:"flex",alignItems:"center",gap:4,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"5px 10px",cursor:"pointer",color:"#8B7B72",minHeight:32}}><span style={{fontFamily:"var(--mono)",fontSize:9}}>v{APP_VERSION}</span><span style={{fontSize:12}}>🔄</span></button>
          <button onClick={()=>{clearApiKey();setAK("");}} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:"#8B7B72",fontSize:14,cursor:"pointer",padding:"5px 8px",minHeight:32,display:"flex",alignItems:"center"}}>⚙️</button>
        </div>
      </div>

      <div style={S.tabs}>
        <button style={{...S.tab,...(tab==="camera"?S.tabOn:{})}} onClick={()=>setTab("camera")}>📷</button>
        <button style={{...S.tab,...(tab==="results"?S.tabOn:{})}} onClick={()=>setTab("results")}>📊{results&&<span style={S.badge}>{results.total}</span>}</button>
        <button style={{...S.tab,...(tab==="products"?S.tabOn:{})}} onClick={()=>setTab("products")}>📋{parList.length>0&&<span style={S.badge}>{parList.length}</span>}</button>
      </div>

      {tab==="camera"&&<div style={S.page}>
        {/* Hidden file input for photo scan */}
        <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={doPhotoScan} style={{display:"none"}}/>

        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:"40px 0"}}>
          <span style={{fontSize:56}}>📸</span>
          <div style={{textAlign:"center"}}>
            <div style={{fontFamily:"var(--sans)",fontSize:16,fontWeight:600,color:"#EDE5DD",marginBottom:4}}>Scan Inventory</div>
            <div style={{fontFamily:"var(--mono)",fontSize:11,color:"#6B5E55",lineHeight:1.5}}>Take a photo of a shelf or fridge<br/>for best results</div>
          </div>
          <button onClick={()=>fileRef.current?.click()} disabled={scanning} style={{width:"100%",maxWidth:300,padding:"18px 20px",background:"linear-gradient(135deg,var(--accent),var(--al))",border:"none",borderRadius:14,color:"#FFF",fontFamily:"var(--sans)",fontSize:16,fontWeight:700,cursor:"pointer",minHeight:56,opacity:scanning?.5:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {scanning?"🔍 Analyzing...":"📸 Take Photo"}
          </button>
        </div>
        {error&&<div style={S.err}>⚠️ {error}</div>}
      </div>}

      {tab==="results"&&<div style={S.page}>
        {!results?<div style={S.empty}><span style={{fontSize:40}}>📷</span><span style={{color:"#667788",fontSize:14}}>No scan yet</span></div>:(
          <>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontFamily:"var(--mono)",fontSize:9,color:"#667788"}}>Current scan</span>
              <button onClick={()=>{setResults(null);setTab("camera");}} style={{fontFamily:"var(--mono)",fontSize:10,color:"#E74C3C",background:"rgba(231,76,60,0.08)",border:"1px solid rgba(231,76,60,0.2)",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontWeight:700,minHeight:32}}>✕ Clear</button>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,.03)",borderRadius:14,padding:"12px 14px",marginBottom:10,border:"1px solid rgba(255,255,255,.05)"}}>
              <span style={{fontFamily:"var(--mono)",fontSize:10,color:"#8B7B72",textTransform:"uppercase",letterSpacing:1.8}}>Scan Results</span>
              <div style={{display:"flex",alignItems:"baseline",gap:4}}><span style={{fontFamily:"var(--mono)",fontSize:30,fontWeight:700,color:"var(--al)"}}>{results.total}</span><span style={{fontFamily:"var(--mono)",fontSize:11,color:"#667788"}}>items</span></div>
            </div>
            {/* Stock alert view */}
            {(()=>{
              // Flatten all items with their stock levels
              const allItems=[];
              results.categories.forEach((g,gi)=>{
                g.items.forEach((item,ii)=>{
                  const par=findPar(item.product,parList);
                  const level=par?getStockLevel(item.count,par.par):"good";
                  const tier=par?VOLUME_TIERS[par.volume]:null;
                  allItems.push({...item,gi,ii,par,level,tier,category:g.category});
                });
              });
              // Sort: low first, then getting_low, then good
              const order={low:0,getting_low:1,good:2};
              allItems.sort((a,b)=>order[a.level]-order[b.level]);
              // Group by stock level
              const groups=[
                {key:"low",items:allItems.filter(i=>i.level==="low")},
                {key:"getting_low",items:allItems.filter(i=>i.level==="getting_low")},
                {key:"good",items:allItems.filter(i=>i.level==="good")},
              ].filter(g=>g.items.length>0);

              const lowCount=allItems.filter(i=>i.level==="low").length;
              const warningCount=allItems.filter(i=>i.level==="getting_low").length;

              return(<>
                {/* Alert summary */}
                {(lowCount>0||warningCount>0)&&(
                  <div style={{display:"flex",gap:8,marginBottom:10}}>
                    {lowCount>0&&<div style={{flex:1,padding:"8px 10px",background:"rgba(226,75,74,0.1)",border:"1px solid rgba(226,75,74,0.25)",borderRadius:10,textAlign:"center"}}><span style={{fontFamily:"var(--mono)",fontSize:18,fontWeight:700,color:"#E24B4A"}}>{lowCount}</span><div style={{fontFamily:"var(--mono)",fontSize:9,color:"#E24B4A",marginTop:2}}>RESTOCK</div></div>}
                    {warningCount>0&&<div style={{flex:1,padding:"8px 10px",background:"rgba(186,117,23,0.1)",border:"1px solid rgba(186,117,23,0.25)",borderRadius:10,textAlign:"center"}}><span style={{fontFamily:"var(--mono)",fontSize:18,fontWeight:700,color:"#BA7517"}}>{warningCount}</span><div style={{fontFamily:"var(--mono)",fontSize:9,color:"#BA7517",marginTop:2}}>GETTING LOW</div></div>}
                  </div>
                )}

                {groups.map(group=>{
                  const sl=STOCK_LEVELS[group.key];
                  return(
                    <div key={group.key} style={{marginBottom:14}}>
                      <div style={{fontFamily:"var(--mono)",fontSize:10,fontWeight:700,color:sl.color,textTransform:"uppercase",letterSpacing:1.2,marginBottom:6}}>{sl.label}</div>
                      {group.items.map(item=>{
                        const isEditingName=editing===`${item.gi}-${item.ii}-product`;
                        const isEditingCount=editing===`${item.gi}-${item.ii}-count`;
                        const st=catStyle(item.category);
                        return(
                          <div key={`${item.gi}-${item.ii}`} style={{display:"flex",alignItems:"flex-start",padding:"10px 10px",marginBottom:4,gap:8,borderLeft:`3px solid ${sl.border}`,borderRadius:0,background:sl.bg}}>
                            <button onClick={()=>deleteItem(item.gi,item.ii)} style={{background:"none",border:"none",color:"#6B5E55",fontSize:14,cursor:"pointer",padding:"2px",marginTop:1,flexShrink:0}}>✕</button>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                                {isEditingName?(
                                  <input value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={commitEdit} onKeyDown={e=>{if(e.key==="Enter")commitEdit();}} autoFocus style={{fontSize:13,fontWeight:600,color:"#EDE5DD",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(139,41,66,0.4)",borderRadius:6,padding:"4px 8px",outline:"none",fontFamily:"var(--sans)",width:"100%",maxWidth:200}}/>
                                ):(
                                  <span onClick={()=>startEdit(item.gi,item.ii,"product")} style={{fontSize:13,fontWeight:600,color:"#EDE5DD",cursor:"pointer",borderBottom:"1px dashed rgba(255,255,255,0.15)"}}>{item.product}</span>
                                )}
                              </div>
                              <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4,flexWrap:"wrap"}}>
                                {item.tier&&<span style={{fontSize:10,background:item.tier.bg,color:item.tier.color,padding:"2px 7px",borderRadius:4,fontWeight:600,fontFamily:"var(--sans)"}}>{item.tier.label}</span>}
                                {item.par&&<span style={{fontFamily:"var(--mono)",fontSize:10,color:sl.color}}>par: {item.par.par}</span>}
                                {!item.par&&<span style={{fontFamily:"var(--mono)",fontSize:10,color:"#6B5E55",fontStyle:"italic"}}>no par set</span>}
                              </div>
                            </div>
                            {isEditingCount?(
                              <input type="number" value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={commitEdit} onKeyDown={e=>{if(e.key==="Enter")commitEdit();}} autoFocus style={{width:52,fontFamily:"var(--mono)",fontSize:20,fontWeight:700,color:sl.color,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(139,41,66,0.4)",borderRadius:6,padding:"4px",outline:"none",textAlign:"center",flexShrink:0}}/>
                            ):(
                              <span onClick={()=>startEdit(item.gi,item.ii,"count")} style={{fontFamily:"var(--mono)",fontSize:22,fontWeight:700,color:sl.color,flexShrink:0,cursor:"pointer",borderBottom:"2px dashed rgba(255,255,255,0.15)",paddingBottom:1}}>{item.count}</span>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </>);
            })()}

            {/* Text Results button */}
            <button onClick={()=>{
              const now=new Date();
              const date=now.toLocaleDateString("en-US",{month:"short",day:"numeric"});
              const time=now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
              // Build items with stock levels
              const allItems=[];
              results.categories.forEach(g=>{
                g.items.forEach(item=>{
                  const par=findPar(item.product,parList);
                  const level=par?getStockLevel(item.count,par.par):"good";
                  allItems.push({...item,par,level});
                });
              });
              const low=allItems.filter(i=>i.level==="low");
              const gettingLow=allItems.filter(i=>i.level==="getting_low");
              const good=allItems.filter(i=>i.level==="good");
              let text=`AberScan — ${date}, ${time}\n\n`;
              if(low.length>0){
                text+=`🔴 RESTOCK NOW\n`;
                low.forEach(i=>{text+=`  ${i.product} — ${i.count}${i.par?` (par ${i.par.par})`:""}\n`;});
                text+=`\n`;
              }
              if(gettingLow.length>0){
                text+=`🟡 GETTING LOW\n`;
                gettingLow.forEach(i=>{text+=`  ${i.product} — ${i.count}${i.par?` (par ${i.par.par})`:""}\n`;});
                text+=`\n`;
              }
              if(good.length>0){
                text+=`🟢 GOOD\n`;
                good.forEach(i=>{text+=`  ${i.product} — ${i.count}${i.par?` (par ${i.par.par})`:""}\n`;});
                text+=`\n`;
              }
              text+=`Total: ${results.total} items`;
              if(low.length>0)text+=` | ${low.length} need restock`;
              if(navigator.share){
                navigator.share({title:"AberScan Inventory",text}).catch(()=>{});
              }else{
                try{navigator.clipboard.writeText(text);alert("Copied to clipboard");}catch{}
              }
            }} style={{marginTop:16,width:"100%",padding:"16px",background:"linear-gradient(135deg,var(--accent),var(--al))",border:"none",borderRadius:14,color:"#FFF",fontFamily:"var(--sans)",fontSize:15,fontWeight:700,cursor:"pointer",minHeight:52,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              💬 Text Results
            </button>
          </>
        )}
      </div>}

      {/* ═══ PRODUCTS ═══ */}
      {tab==="products"&&<div style={S.page}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{fontFamily:"var(--mono)",fontSize:10,color:"#8B7B72",textTransform:"uppercase",letterSpacing:1.8}}>Products & Par Levels</span>
          <button onClick={()=>setAddingProduct(true)} style={{padding:"6px 12px",background:"linear-gradient(135deg,var(--accent),var(--al))",border:"none",borderRadius:8,color:"#FFF",fontFamily:"var(--sans)",fontSize:12,fontWeight:700,cursor:"pointer",minHeight:32}}>+ Add</button>
        </div>
        <div style={{fontFamily:"var(--sans)",fontSize:12,color:"#667788",marginBottom:16,lineHeight:1.5}}>Set par levels and volume tiers for your products. Used to determine stock alerts after scanning.</div>

        {/* Add product form */}
        {addingProduct&&(
          <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:12,marginBottom:12}}>
            <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Product name" onKeyDown={e=>{if(e.key==="Enter")addPar();}} autoFocus style={{width:"100%",padding:"10px 12px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"var(--text)",fontFamily:"var(--sans)",fontSize:13,outline:"none",marginBottom:8}}/>
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              {["high","med","low"].map(v=>(
                <button key={v} onClick={()=>{setNewVolume(v);setNewPar(String(VOLUME_TIERS[v].par));}} style={{flex:1,padding:"8px",borderRadius:8,fontFamily:"var(--sans)",fontSize:11,fontWeight:600,cursor:"pointer",minHeight:36,background:newVolume===v?VOLUME_TIERS[v].bg:"rgba(255,255,255,0.03)",border:newVolume===v?`1px solid ${VOLUME_TIERS[v].color}30`:"1px solid rgba(255,255,255,0.06)",color:newVolume===v?VOLUME_TIERS[v].color:"#8B7B72"}}>{VOLUME_TIERS[v].label}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <span style={{fontFamily:"var(--mono)",fontSize:11,color:"#8B7B72"}}>Par:</span>
              <input type="number" value={newPar||VOLUME_TIERS[newVolume].par} onChange={e=>setNewPar(e.target.value)} style={{width:60,padding:"8px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"var(--text)",fontFamily:"var(--mono)",fontSize:13,outline:"none",textAlign:"center"}}/>
              <div style={{flex:1}}/>
              <button onClick={()=>setAddingProduct(false)} style={{padding:"8px 14px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:"#8B7B72",fontFamily:"var(--sans)",fontSize:12,cursor:"pointer",minHeight:32}}>Cancel</button>
              <button onClick={addPar} style={{padding:"8px 14px",background:"linear-gradient(135deg,var(--accent),var(--al))",border:"none",borderRadius:8,color:"#FFF",fontFamily:"var(--sans)",fontSize:12,fontWeight:700,cursor:"pointer",minHeight:32}}>Save</button>
            </div>
          </div>
        )}

        {/* Product list */}
        {parList.length===0&&!addingProduct?(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"40px 0",gap:8}}>
            <span style={{fontSize:40}}>📋</span>
            <span style={{color:"#667788",fontSize:14}}>No products yet</span>
            <span style={{color:"#555",fontSize:12}}>Tap + Add to set up your inventory</span>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {parList.map((p,i)=>{
              const tier=VOLUME_TIERS[p.volume]||VOLUME_TIERS.med;
              const isEditing=editingPar===i;
              return(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:10,borderLeft:`3px solid ${tier.color}40`}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:"var(--sans)",fontSize:13,fontWeight:600,color:"#EDE5DD"}}>{p.name}</div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}>
                      <span style={{fontSize:11,background:tier.bg,color:tier.color,padding:"2px 8px",borderRadius:4,fontWeight:600,fontFamily:"var(--sans)"}}>{tier.label}</span>
                      {isEditing?(
                        <div style={{display:"flex",gap:4,alignItems:"center"}}>
                          <span style={{fontFamily:"var(--mono)",fontSize:10,color:"#8B7B72"}}>par:</span>
                          <input type="number" defaultValue={p.par} onBlur={e=>{const v=parseInt(e.target.value);if(v>0)updatePar(i,{par:v});else setEditingPar(null);}} onKeyDown={e=>{if(e.key==="Enter"){const v=parseInt(e.target.value);if(v>0)updatePar(i,{par:v});else setEditingPar(null);}}} autoFocus style={{width:48,padding:"3px 6px",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(139,41,66,0.4)",borderRadius:4,color:"var(--text)",fontFamily:"var(--mono)",fontSize:11,outline:"none",textAlign:"center"}}/>
                          {["high","med","low"].map(v=>(
                            <button key={v} onClick={()=>updatePar(i,{volume:v,par:parseInt(newPar)||VOLUME_TIERS[v].par})} style={{padding:"2px 6px",borderRadius:4,fontSize:9,fontFamily:"var(--mono)",cursor:"pointer",background:p.volume===v?VOLUME_TIERS[v].bg:"transparent",border:p.volume===v?`1px solid ${VOLUME_TIERS[v].color}40`:"1px solid rgba(255,255,255,0.06)",color:p.volume===v?VOLUME_TIERS[v].color:"#6B5E55"}}>{v[0].toUpperCase()}</button>
                          ))}
                        </div>
                      ):(
                        <span onClick={()=>setEditingPar(i)} style={{fontFamily:"var(--mono)",fontSize:10,color:"#8B7B72",cursor:"pointer",borderBottom:"1px dashed rgba(255,255,255,0.15)"}}>par: {p.par}</span>
                      )}
                    </div>
                  </div>
                  <button onClick={()=>removePar(i)} style={{background:"none",border:"none",color:"#6B5E55",fontSize:14,cursor:"pointer",padding:"4px"}}>✕</button>
                </div>
              );
            })}
          </div>
        )}
      </div>}
    </div>
  );
}

const S={
  root:{minHeight:"100dvh",background:"#110E0C",fontFamily:"var(--sans)",color:"#F5F0EB",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"},
  hdr:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"max(14px,env(safe-area-inset-top,14px)) 16px 6px",position:"sticky",top:0,zIndex:20,background:"#110E0C"},
  tabs:{display:"flex",padding:"0 12px 6px",gap:4,position:"sticky",top:52,zIndex:20,background:"#110E0C"},
  tab:{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"10px 4px",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.05)",borderRadius:10,color:"#6B5E55",fontFamily:"var(--sans)",fontSize:13,fontWeight:600,cursor:"pointer",minHeight:44},
  tabOn:{background:"rgba(139,41,66,.12)",borderColor:"rgba(139,41,66,.3)",color:"var(--al)"},
  badge:{fontFamily:"var(--mono)",fontSize:9,fontWeight:700,color:"#FFF",background:"var(--accent)",padding:"1px 6px",borderRadius:8,marginLeft:4},
  page:{flex:1,padding:"8px 12px 32px",display:"flex",flexDirection:"column"},
  vf:{width:"100%",aspectRatio:"4/3",background:"#1A1411",borderRadius:16,overflow:"hidden",position:"relative",border:"1px solid rgba(255,255,255,.06)"},
  vid:{width:"100%",height:"100%",objectFit:"cover",display:"block"},
  ph:{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"},
  overlay:{position:"absolute",inset:0,background:"rgba(139,41,66,.06)"},
  line:{position:"absolute",left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,var(--al),transparent)",boxShadow:"0 0 16px var(--accent)",animation:"scanLine 1.8s ease-in-out infinite alternate"},
  ctrls:{display:"flex",gap:10,marginTop:10},
  big:{width:"100%",padding:"14px 20px",background:"linear-gradient(135deg,var(--accent),var(--al))",border:"none",borderRadius:12,color:"#FFF",fontFamily:"var(--sans)",fontSize:15,fontWeight:700,cursor:"pointer",minHeight:48},
  circ:{width:48,height:48,minWidth:48,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:12,color:"#F5F0EB",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"},
  err:{marginTop:8,background:"rgba(231,76,60,.1)",border:"1px solid rgba(231,76,60,.25)",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#E74C3C"},
  empty:{display:"flex",flexDirection:"column",alignItems:"center",padding:"40px 0",gap:6},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
