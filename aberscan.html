<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#110E0C">
<title>AberScan</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--sans:'DM Sans',sans-serif;--mono:'Space Mono',monospace;--accent:#8B2942;--al:#A83355;--bg:#110E0C;--text:#F5F0EB;--muted:#8B7B72;--dim:#6B5E55}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
@keyframes scanLine{0%{top:0}100%{top:calc(100% - 2px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState, useRef, useCallback, useEffect} = React;

const APP_VERSION='4.1.0';
(()=>{
  const saved=localStorage.getItem('aberscan_version');
  if(saved&&saved!==APP_VERSION){
    localStorage.setItem('aberscan_version',APP_VERSION);
    if(typeof caches!=='undefined')caches.keys().then(k=>Promise.all(k.map(c=>caches.delete(c))));
    window.location.reload(true);
    return;
  }
  localStorage.setItem('aberscan_version',APP_VERSION);
})();

function getApiKey(){ return localStorage.getItem('aberscan_api_key'); }
function setApiKey(k){ localStorage.setItem('aberscan_api_key', k); }
function clearApiKey(){ localStorage.removeItem('aberscan_api_key'); }

const CAT = {
  beer:{icon:"🍺",c:"#E8A838",bg:"rgba(232,168,56,0.10)"},
  cider:{icon:"🍏",c:"#8BC34A",bg:"rgba(139,195,74,0.10)"},
  seltzer:{icon:"✨",c:"#00BCD4",bg:"rgba(0,188,212,0.10)"},
  rtd:{icon:"🍹",c:"#FF7043",bg:"rgba(255,112,67,0.10)"},
  wine:{icon:"🍷",c:"#C0392B",bg:"rgba(192,57,43,0.10)"},
  spirits:{icon:"🥃",c:"#E67E22",bg:"rgba(230,126,34,0.10)"},
  garnishes:{icon:"🍋",c:"#2ECC71",bg:"rgba(46,204,113,0.10)"},
  mixers:{icon:"🧃",c:"#3498DB",bg:"rgba(52,152,219,0.10)"},
  "non-alcoholic":{icon:"🥤",c:"#1ABC9C",bg:"rgba(26,188,156,0.10)"},
  food:{icon:"🍽️",c:"#E74C3C",bg:"rgba(231,76,60,0.10)"},
  supplies:{icon:"📦",c:"#95A5A6",bg:"rgba(149,165,166,0.10)"},
  other:{icon:"📋",c:"#7F8C8D",bg:"rgba(127,140,141,0.10)"},
};
const TI = {can:"🥫",bottle:"🍾",keg:"🛢️",box:"📦",bag:"🛍️",container:"🫙",jar:"🫙",handle:"🍾",mini:"🍾","case":"📦",tap:"🚰",growler:"🍺",crowler:"🥫"};
const catStyle=(cat)=>{const k=Object.keys(CAT).find(k=>cat.toLowerCase().includes(k));return CAT[k]||CAT.other;};
const typeIcon=(t)=>{const k=Object.keys(TI).find(k=>(t||"").toLowerCase().includes(k));return TI[k]||"•";};

const PROMPT = `You are a bar/restaurant inventory assistant. Analyze this image and count every visible item, organized by category with specific products.

CATEGORIES: Beer, Ciders, Seltzers, RTD/Cocktails, Wine, Spirits, Garnishes, Mixers, Non-Alcoholic, Food, Supplies, Other

RULES:
1. Each distinct product = own line. "Miller Lite" ≠ "High Life".
2. Same product, different container = separate lines. "Bud Light can" ≠ "Bud Light bottle". "Tito's handle" ≠ "Tito's 750ml".
3. "type" field is critical: can, bottle, keg, handle, mini, case, container, jar, bag, box, tap, growler, crowler, carton, pack, etc.
4. Read labels for brand names. If unreadable, describe ("unknown IPA cans", "red wine bottle").
5. Garnishes/perishables: ALWAYS note dates, day-dots, prep dates, condition (fresh, browning, wilting, soft). Format dates as "dated M/D".
6. Spirits: note fill level if visible (full, 3/4, half, 1/4, near empty).
7. Note quantities as precisely as possible.

CATEGORY GUIDE — use the right one:
- Beer: traditional beer only (lagers, ales, IPAs, stouts, pilsners, wheat beers)
- Ciders: hard ciders (Angry Orchard, Ace, Strongbow, etc.)
- Seltzers: hard/alcoholic seltzers (White Claw, Truly, High Noon, Vizzy, Topo Chico Hard Seltzer, etc.)
- RTD/Cocktails: ready-to-drink cocktails, canned cocktails, premixed drinks (Cutwater, On The Rocks, Ranch Water, etc.)
- Wine: wine bottles, boxed wine, wine cans
- Spirits: liquor bottles (vodka, whiskey, tequila, rum, gin, etc.)
- Garnishes: limes, lemons, olives, cherries, oranges, etc.
- Mixers: tonic, soda, juice, simple syrup, bitters, sour mix
- Non-Alcoholic: water, NA beer, soft drinks, energy drinks
- Food: snacks, bar food, kitchen items
- Supplies: napkins, straws, cups, cleaning supplies, ice
- Other: anything else

JSON ONLY (no markdown, no backticks):
{
  "categories": [
    {
      "category": "Beer",
      "items": [
        {"product":"Miller Lite","type":"can","count":12,"details":"12oz"},
        {"product":"Miller Lite","type":"bottle","count":6,"details":"12oz longneck"},
        {"product":"Modelo Especial","type":"bottle","count":8,"details":"12oz"}
      ]
    },
    {
      "category": "Spirits",
      "items": [
        {"product":"Tito's Vodka","type":"handle","count":1,"details":"1.75L, 3/4 full"},
        {"product":"Jameson","type":"bottle","count":1,"details":"750ml, half"}
      ]
    },
    {
      "category": "Garnishes",
      "items": [
        {"product":"Limes","type":"container","count":2,"details":"dated 4/20, cut wedges"},
        {"product":"Lemons","type":"container","count":1,"details":"dated 4/21, whole, fresh"},
        {"product":"Olives","type":"jar","count":2,"details":"Manzanilla, half full"}
      ]
    }
  ],
  "total": 33,
  "notes": "observations, low stock, expiry concerns"
}

Empty: {"categories":[],"total":0,"notes":"No inventory items detected"}`;

function App() {
  const videoRef=useRef(null),canvasRef=useRef(null),streamRef=useRef(null),scanningRef=useRef(false);
  const [apiKey,setApiKeyState]=useState(getApiKey()||"");
  const [keyInput,setKeyInput]=useState("");
  const [streaming,setStreaming]=useState(false);
  const [scanning,setScanning]=useState(false);
  const [results,setResults]=useState(null);
  const [error,setError]=useState(null);
  const [facingMode,setFacingMode]=useState("environment");
  const [tab,setTab]=useState("camera");
  const [collapsed,setCollapsed]=useState({});
  const [torch,setTorch]=useState(false);

  const startCamera=useCallback(async(facing)=>{
    try{
      setError(null);
      if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing||facingMode,width:{ideal:1920},height:{ideal:1080}},audio:false});
      streamRef.current=stream;
      if(videoRef.current){videoRef.current.srcObject=stream;await videoRef.current.play();}
      setStreaming(true);
    }catch{setError("Camera access denied.");}
  },[facingMode]);

  const stopCamera=useCallback(()=>{
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
    if(videoRef.current)videoRef.current.srcObject=null;
    setStreaming(false);setTorch(false);
  },[]);

  const toggleTorch=useCallback(async()=>{
    if(!streamRef.current)return;
    const track=streamRef.current.getVideoTracks()[0];
    if(!track)return;
    try{
      const next=!torch;
      await track.applyConstraints({advanced:[{torch:next}]});
      setTorch(next);
    }catch{/* torch not supported on this device/camera */}
  },[torch]);

  const flipCamera=useCallback(()=>{
    const n=facingMode==="environment"?"user":"environment";
    setFacingMode(n);if(streaming)startCamera(n);
  },[facingMode,streaming,startCamera]);

  const doScan=useCallback(async()=>{
    if(!videoRef.current||!canvasRef.current||scanningRef.current)return;
    scanningRef.current=true;setScanning(true);setError(null);setResults(null);

    const v=videoRef.current,c=canvasRef.current;
    if(v.videoWidth===0){setError("Camera not ready.");setScanning(false);scanningRef.current=false;return;}

    c.width=v.videoWidth;c.height=v.videoHeight;
    c.getContext("2d").drawImage(v,0,0);
    const b64=c.toDataURL("image/jpeg",0.85).split(",")[1];

    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":getApiKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:2000,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
            {type:"text",text:PROMPT},
          ]}],
        }),
      });
      if(!r.ok){
        const e=await r.json().catch(()=>({}));
        if(r.status===401||r.status===403)setError("Invalid API key. Tap ⚙️ to fix.");
        else if(r.status===429)setError("Rate limited — wait and retry.");
        else setError(`API error: ${e.error?.message||r.status}`);
        setScanning(false);scanningRef.current=false;return;
      }
      const data=await r.json();
      const txt=(data.content||[]).map(c=>c.text||"").join("");
      if(!txt.trim()){setError("Empty response — try again.");setScanning(false);scanningRef.current=false;return;}

      // Robust JSON extraction
      let parsed=null;
      const stripped=txt.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
      try{parsed=JSON.parse(stripped);}catch{}
      if(!parsed){
        let s=-1,d=0,e=-1;
        for(let i=0;i<txt.length;i++){if(txt[i]==='{'){if(d===0)s=i;d++;}else if(txt[i]==='}'){d--;if(d===0&&s>=0){e=i;break;}}}
        if(s>=0&&e>s)try{parsed=JSON.parse(txt.substring(s,e+1));}catch{}
      }
      if(!parsed||!Array.isArray(parsed.categories)){setError("Couldn't parse results — try again.");setScanning(false);scanningRef.current=false;return;}

      const cats=(parsed.categories||[]).map(g=>{
        const items=(g.items||[]).map(i=>({product:i.product||"Unknown",type:i.type||"item",count:typeof i.count==="number"?i.count:parseInt(i.count)||0,details:i.details||""}));
        return{category:g.category||"Other",items,subtotal:items.reduce((s,i)=>s+i.count,0)};
      }).filter(g=>g.items.length>0);

      setResults({categories:cats,total:cats.reduce((s,g)=>s+g.subtotal,0),notes:parsed.notes||""});
      setTab("results");
    }catch(e){
      console.error(e);
      setError(e.message.includes("fetch")?"Network error — check connection.":"Scan failed — try again.");
    }finally{setScanning(false);scanningRef.current=false;}
  },[]);

  useEffect(()=>()=>stopCamera(),[stopCamera]);

  const clearScan=()=>{setResults(null);setTab("camera");};

  // ── API KEY ──
  if(!apiKey){
    return(
      <div style={S.root}>
        <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"0 24px"}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontFamily:"Georgia,serif",fontWeight:700,fontStyle:"italic",color:"#FFF",border:"2px solid rgba(255,255,255,0.15)",marginBottom:14}}>A</div>
          <div style={{display:"flex",alignItems:"baseline",marginBottom:24}}>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:800,color:"#F5F0EB"}}>Aber</span>
            <span style={{fontFamily:"var(--mono)",fontSize:21,fontWeight:700,color:"var(--al)"}}>Scan</span>
          </div>
          <div style={{fontFamily:"var(--sans)",fontSize:13,color:"var(--muted)",marginBottom:16,textAlign:"center"}}>Enter API key to get started</div>
          <input type="password" value={keyInput} onChange={e=>setKeyInput(e.target.value)} placeholder="sk-ant-..." style={{width:"100%",maxWidth:320,padding:"14px 16px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,color:"var(--text)",fontFamily:"var(--mono)",fontSize:13,outline:"none",marginBottom:12}} onKeyDown={e=>{if(e.key==="Enter"&&keyInput.trim()){setApiKey(keyInput.trim());setApiKeyState(keyInput.trim());}}}/>
          <button onClick={()=>{if(keyInput.trim()){setApiKey(keyInput.trim());setApiKeyState(keyInput.trim());}}} style={{width:"100%",maxWidth:320,padding:"14px",background:"linear-gradient(135deg,var(--accent),var(--al))",border:"none",borderRadius:12,color:"#FFF",fontFamily:"var(--sans)",fontSize:15,fontWeight:700,cursor:"pointer",minHeight:48}}>Connect</button>
          <div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--dim)",marginTop:12,textAlign:"center"}}>Key is stored locally on this device only</div>
        </div>
      </div>
    );
  }

  return(
    <div style={S.root}>
      {/* HEADER */}
      <div style={S.header}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:"#110E0C",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontFamily:"Georgia,serif",fontWeight:700,fontStyle:"italic",color:"#FFF",border:"3px solid var(--accent)",boxShadow:"0 0 0 1px #6B1D32"}}>A</div>
          <div style={{display:"flex",alignItems:"baseline"}}>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:800,color:"#F5F0EB",letterSpacing:0.2}}>Aber</span>
            <span style={{fontFamily:"var(--mono)",fontSize:14,fontWeight:700,color:"var(--al)",letterSpacing:-0.5}}>Scan</span>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <button onClick={()=>{if(typeof caches!=='undefined')caches.keys().then(k=>Promise.all(k.map(c=>caches.delete(c))));window.location.reload(true);}} style={{display:"flex",alignItems:"center",gap:5,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"5px 10px",cursor:"pointer",color:"#8B7B72",minHeight:32}}>
            <span style={{fontFamily:"var(--mono)",fontSize:9,letterSpacing:0.5}}>v{APP_VERSION}</span>
            <span style={{fontSize:12}}>🔄</span>
          </button>
          <button onClick={()=>{clearApiKey();setApiKeyState("");}} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:"#8B7B72",fontSize:14,cursor:"pointer",padding:"5px 8px",minHeight:32,display:"flex",alignItems:"center"}}>⚙️</button>
        </div>
      </div>

      {/* TABS */}
      <div style={S.tabBar}>
        <button style={{...S.tabBtn,...(tab==="camera"?S.tabAct:{})}} onClick={()=>setTab("camera")}>📷 Camera</button>
        <button style={{...S.tabBtn,...(tab==="results"?S.tabAct:{})}} onClick={()=>setTab("results")}>
          📊 Results{results&&<span style={S.badge}>{results.total}</span>}
        </button>
      </div>

      {/* ═══ CAMERA ═══ */}
      {tab==="camera"&&(
        <div style={S.page}>
          <div style={S.viewfinder}>
            <video ref={videoRef} style={S.video} playsInline muted/>
            <canvas ref={canvasRef} style={{display:"none"}}/>
            {scanning&&(<div style={S.scanOverlay}><div style={S.scanLine}/><div style={{position:"absolute",bottom:16,left:0,right:0,textAlign:"center"}}><span style={{fontFamily:"var(--mono)",fontSize:11,color:"#FFF",background:"rgba(0,0,0,0.7)",padding:"6px 14px",borderRadius:8}}>🔍 Scanning...</span></div></div>)}
            {!streaming&&(<div style={S.placeholder}><span style={{fontSize:44,marginBottom:10}}>📷</span><span style={{fontFamily:"var(--sans)",fontSize:15,color:"#8899AA",fontWeight:600}}>Tap to start camera</span><span style={{fontFamily:"var(--mono)",fontSize:10,color:"#556677",marginTop:3}}>Point at shelves, fridges, or bar</span></div>)}
            {streaming&&!scanning&&[["top","left"],["top","right"],["bottom","left"],["bottom","right"]].map(([v,h])=>(<div key={v+h} style={{position:"absolute",[v]:10,[h]:10,width:24,height:24,borderRadius:2,[`border${v[0].toUpperCase()+v.slice(1)}`]:"3px solid var(--al)",[`border${h[0].toUpperCase()+h.slice(1)}`]:"3px solid var(--al)"}}/>))}
          </div>

          <div style={S.ctrlRow}>
            {!streaming?(
              <button style={S.bigBtn} onClick={()=>startCamera()}>Start Camera</button>
            ):(
              <>
                <button style={S.circBtn} onClick={flipCamera}>🔄</button>
                <button style={{...S.circBtn,...(torch?{background:"rgba(241,196,15,0.2)",borderColor:"rgba(241,196,15,0.4)",color:"#F1C40F"}:{})}} onClick={toggleTorch}>{torch?"🔦":"💡"}</button>
                <button style={{...S.bigBtn,flex:1,opacity:scanning?.5:1}} onClick={doScan} disabled={scanning}>{scanning?"🔍 Scanning...":"⊙ Scan"}</button>
                <button style={S.circBtn} onClick={stopCamera}>✕</button>
              </>
            )}
          </div>
          {error&&<div style={S.err}>⚠️ {error}</div>}
        </div>
      )}

      {/* ═══ RESULTS ═══ */}
      {tab==="results"&&(
        <div style={S.page}>
          {!results?(
            <div style={S.empty}><span style={{fontSize:40}}>📷</span><span style={{color:"#667788",fontSize:14}}>No scan yet</span></div>
          ):(
            <>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontFamily:"var(--mono)",fontSize:9,color:"#667788"}}>Current scan</span>
                <button onClick={clearScan} style={{fontFamily:"var(--mono)",fontSize:10,color:"#E74C3C",background:"rgba(231,76,60,0.08)",border:"1px solid rgba(231,76,60,0.2)",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontWeight:700,minHeight:32}}>✕ Clear</button>
              </div>

              {/* Total */}
              <div style={S.summaryCard}>
                <div style={S.label}>Scan Results</div>
                <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                  <span style={{fontFamily:"var(--mono)",fontSize:30,fontWeight:700,color:"var(--al)"}}>{results.total}</span>
                  <span style={{fontFamily:"var(--mono)",fontSize:11,color:"#667788"}}>items</span>
                </div>
              </div>

              {/* Chips */}
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
                {(results.categories||[]).map(g=>{const s=catStyle(g.category);return<span key={g.category} style={{fontFamily:"var(--mono)",fontSize:10,padding:"3px 8px",borderRadius:6,background:s.bg,color:s.c,border:`1px solid ${s.c}30`,fontWeight:600}}>{s.icon} {g.subtotal} {g.category}</span>;})}
              </div>

              {/* Categories */}
              {(results.categories||[]).map((g,gi)=>{
                const st=catStyle(g.category);
                const isColl=collapsed[g.category];
                return(
                  <div key={g.category} style={{background:"rgba(255,255,255,0.02)",borderRadius:12,overflow:"hidden",border:"1px solid rgba(255,255,255,0.04)",marginBottom:8,animation:"slideUp .3s ease both",animationDelay:`${gi*50}ms`}}>
                    <button style={S.catHead} onClick={()=>setCollapsed(p=>({...p,[g.category]:!p[g.category]}))}>
                      <div style={{display:"flex",alignItems:"center",gap:7}}>
                        <span style={{fontSize:18}}>{st.icon}</span>
                        <span style={{fontFamily:"var(--sans)",fontSize:14,fontWeight:700,color:"#E8EEF4"}}>{g.category}</span>
                        <span style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:700,padding:"1px 7px",borderRadius:5,background:st.bg,color:st.c}}>{g.subtotal}</span>
                      </div>
                      <span style={{color:"#556677",fontSize:13,transform:isColl?"rotate(-90deg)":"rotate(0)",transition:"transform .15s"}}>▾</span>
                    </button>
                    {!isColl&&(
                      <div style={{padding:"0 8px 8px"}}>
                        {(g.items||[]).map((item,ii)=>(
                          <div key={ii} style={{display:"flex",alignItems:"flex-start",padding:"10px 8px",marginBottom:4,gap:8,borderLeft:`3px solid ${st.c}33`,borderRadius:10,background:"rgba(255,255,255,0.02)"}}>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                                <span style={{fontSize:14}}>{typeIcon(item.type)}</span>
                                <span style={{fontFamily:"var(--sans)",fontSize:13,fontWeight:600,color:"#EDE5DD"}}>{item.product}</span>
                                <span style={{fontFamily:"var(--mono)",fontSize:9,padding:"1px 6px",borderRadius:4,border:`1px solid ${st.c}40`,background:`${st.c}20`,color:st.c,textTransform:"uppercase",letterSpacing:.7,fontWeight:700}}>{item.type}</span>
                              </div>
                              {item.details&&<div style={{fontFamily:"var(--sans)",fontSize:11,color:"#8B7B72",lineHeight:1.2,marginTop:3}}>{item.details}</div>}
                            </div>
                            <span style={{fontFamily:"var(--mono)",fontSize:22,fontWeight:700,color:st.c,flexShrink:0}}>{item.count}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}

              {results.notes&&results.notes!=="No inventory items detected"&&(
                <div style={{marginTop:12,padding:10,background:"rgba(255,255,255,0.02)",borderRadius:8,border:"1px solid rgba(255,255,255,0.04)",display:"flex",flexDirection:"column"}}>
                  <span style={{fontFamily:"var(--mono)",fontSize:9,color:"#667788",textTransform:"uppercase",letterSpacing:1.5,marginBottom:3}}>Notes</span>
                  <span style={{fontFamily:"var(--sans)",fontSize:12,color:"#AABBCC",lineHeight:1.4}}>{results.notes}</span>
                </div>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
}

const S={
